name: Build and Package DEB

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dpkg
        run: sudo apt-get update && sudo apt-get install -y dpkg

      - name: Prepare Debian Structure
        run: |
          mkdir -p stage/DEBIAN
          cp native/client/control stage/DEBIAN/
          chmod 755 stage/DEBIAN
          chmod 644 stage/DEBIAN/control

      - name: Build Package
        run: |
          mkdir -p build_output
          dpkg-deb --build stage build_output/your_tweak_1.0.0_iphoneos-arm.deb

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-deb
          path: build_output/*.deb
